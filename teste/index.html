<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <main class="container">

        <!--coluna da esquerda, com textos iniciais-->
        <section class="sidebar sidebar--left">
            <article class="card">
                <p class="card__text">a</p>
                <p class="card__text">b</p>
                <p class="card__text">c</p>
            </article>
        </section>

        <!--coluna do centro, com textos intermediarios-->
        <section class="sidebar sidebar--main">
            <article class="card">
                <p class="card__title">d</p>
                <p class="card__text">e</p>
                <p class="card__text">f</p>
            </article>
        </section>

        <!--coluna da direita, com textos finalistas-->
        <section class="sidebar sidebar--right">
            <article class="card">
                <p class="card__text">g</p>
                <p class="card__text">h</p>
                <p class="card__text">i</p>
            </article>        
        </section>

    </main>
</body>
</html>
